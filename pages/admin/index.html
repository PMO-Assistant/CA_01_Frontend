<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Hot Desking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/styling.css" />
  <style>
    body.admin-page {
      background: #f7f8fa;
    }
    .admin-wrap {
      max-width: 1080px;
      margin: 24px auto 40px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .admin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .admin-title {
      margin: 0;
      font-size: 1.4rem;
    }
    .admin-sub {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 0.92rem;
    }
    .admin-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
    }
    .admin-card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }
    .admin-form {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) auto auto;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .admin-form input,
    .admin-form select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
    }
    .admin-form-compact {
      grid-template-columns: minmax(220px, 1.4fr) minmax(180px, 1fr) minmax(180px, 1fr) auto;
    }
    .admin-form-tag {
      grid-template-columns: minmax(180px, 1fr) 165px 165px minmax(140px, 1fr) auto;
      align-items: center;
    }
    .admin-form-tag input[type="date"] {
      min-width: 0;
      width: 165px;
      padding: 8px 6px;
    }
    .admin-inline-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 0.9rem;
      color: #374151;
    }
    .admin-form button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #f97316;
      color: #fff;
      white-space: nowrap;
    }
    .admin-table-wrap {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: #fff;
    }
    .admin-table th,
    .admin-table td {
      padding: 9px 10px;
      border-bottom: 1px solid #f0f2f4;
      text-align: left;
      vertical-align: middle;
      font-size: 0.9rem;
    }
    .admin-table th {
      background: #f8fafc;
      font-weight: 600;
      color: #374151;
      white-space: nowrap;
    }
    .admin-table tr:last-child td {
      border-bottom: 0;
    }
    .admin-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .admin-actions button {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      cursor: pointer;
    }
    .admin-actions button i[data-lucide],
    .admin-actions button svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .admin-actions .danger {
      border-color: #ef4444;
      color: #b91c1c;
    }
    .admin-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #f97316;
      cursor: pointer;
    }
    .admin-empty {
      color: #6b7280;
      font-size: 0.9rem;
      margin: 8px 0 0;
    }
    .admin-note {
      margin: 0;
      color: #6b7280;
      font-size: 0.86rem;
    }
    .admin-status {
      margin: 0;
      color: #374151;
      font-size: 0.9rem;
    }
    @media (max-width: 860px) {
      .admin-form {
        grid-template-columns: 1fr 1fr auto;
      }
      .admin-form-compact {
        grid-template-columns: 1fr 1fr 1fr auto;
      }
      .admin-form-tag {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .admin-form-tag input[type="date"] {
        width: 100%;
      }
    }
    @media (max-width: 560px) {
      .admin-form {
        grid-template-columns: 1fr;
      }
      .admin-form-compact {
        grid-template-columns: 1fr;
      }
      .admin-form-tag {
        grid-template-columns: 1fr;
      }
    }

    .admin-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .admin-modal[hidden] {
      display: none;
    }
    .admin-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.45);
      cursor: pointer;
    }
    .admin-modal__panel {
      position: relative;
      width: min(100%, 420px);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.12);
      padding: 18px 20px 16px;
    }
    .admin-modal__title {
      margin: 0 0 14px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #111827;
    }
    .admin-modal__body {
      display: grid;
      gap: 12px;
    }
    .admin-modal__field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .admin-modal__field input[type="text"],
    .admin-modal__field input[type="date"],
    .admin-modal__field select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
    }
    .admin-modal__check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      color: #374151;
    }
    .admin-modal__footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #f0f2f4;
    }
    .admin-modal__btn {
      border-radius: 8px;
      padding: 8px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-modal__btn--ghost {
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
    }
    .admin-modal__btn--primary {
      border: 0;
      background: #f97316;
      color: #fff;
    }
  </style>
</head>
<body class="admin-page">
  <main class="admin-wrap">
    <header class="admin-head admin-card">
      <div>
        <h1 class="admin-title">Admin</h1>
        <p class="admin-sub">CRUD users, seats, and assets</p>
      </div>
      <button id="btn-back" class="action-btn action-btn-dark" type="button">
        <i data-lucide="arrow-left" aria-hidden="true"></i>
        <span>Back</span>
      </button>
    </header>

    <p id="admin-status" class="admin-status"></p>

    <section class="admin-card">
      <h2>Rooms</h2>
      <div class="admin-table-wrap">
        <table class="admin-table" aria-label="Rooms table">
          <thead>
            <tr>
              <th>Room ID</th>
              <th>Room</th>
              <th>Floor</th>
              <th>Bookable</th>
              <th>Active</th>
            </tr>
          </thead>
          <tbody id="rooms-table-body"></tbody>
        </table>
      </div>
      <p id="rooms-empty" class="admin-empty"></p>
    </section>

    <section class="admin-card">
      <h2>Users</h2>
      <form id="user-form" class="admin-form">
        <input
          id="user-name"
          type="text"
          placeholder="Name"
          required
          minlength="2"
          maxlength="60"
          autocomplete="off"
        />
        <label class="admin-inline-check"><input id="user-active" class="admin-checkbox" type="checkbox" checked /> Active</label>
        <button type="submit">Create User</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" aria-label="Users table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
      <p id="users-empty" class="admin-empty"></p>
    </section>

    <section class="admin-card">
      <h2>Employee Tags</h2>
      <form id="tag-form" class="admin-form admin-form-tag">
        <select id="tag-employee" required></select>
        <input id="tag-start" type="date" required />
        <input id="tag-expiry" type="date" required />
        <input
          id="tag-nfc"
          type="text"
          placeholder="NFC UID (optional)"
          maxlength="80"
          autocomplete="off"
        />
        <select id="tag-status" required>
          <option value="Available">Available</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="Lost">Lost</option>
          <option value="Out of Date">Out of Date</option>
        </select>
        <button type="submit">Create Tag</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" aria-label="Employee tags table">
          <thead>
            <tr>
              <th>Tag ID</th>
              <th>Employee</th>
              <th>NFC UID</th>
              <th>Start</th>
              <th>Expiry</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tags-table-body"></tbody>
        </table>
      </div>
      <p id="tags-empty" class="admin-empty"></p>
    </section>

    <section class="admin-card">
      <h2>Seats / Desk</h2>
      <form id="seat-form" class="admin-form">
        <select id="seat-room" required></select>
        <label class="admin-inline-check"><input id="seat-active" class="admin-checkbox" type="checkbox" checked /> Active</label>
        <button type="submit">Create Seat</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" aria-label="Seats / Desk table">
          <thead>
            <tr>
              <th>Desk ID</th>
              <th>Room</th>
              <th>Floor</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="seats-table-body"></tbody>
        </table>
      </div>
      <p id="seats-empty" class="admin-empty"></p>
    </section>

    <section class="admin-card">
      <h2>Assets</h2>
      <form id="asset-form" class="admin-form admin-form-compact">
        <input id="asset-name" type="text" placeholder="Asset name" required minlength="2" maxlength="80" autocomplete="off" />
        <input id="asset-type" type="text" placeholder="Type (e.g. Screen)" required minlength="2" maxlength="40" autocomplete="off" />
        <input id="asset-status" type="text" placeholder="Status (default Available)" maxlength="30" autocomplete="off" />
        <button type="submit">Create Asset</button>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table" aria-label="Assets table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assets-table-body"></tbody>
        </table>
      </div>
      <p id="assets-empty" class="admin-empty"></p>
    </section>
  </main>

  <div id="admin-modal" class="admin-modal" hidden>
    <div class="admin-modal__backdrop" data-admin-modal-dismiss aria-hidden="true"></div>
    <div
      class="admin-modal__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="admin-modal-title"
    >
      <h2 id="admin-modal-title" class="admin-modal__title"></h2>
      <div id="admin-modal-body" class="admin-modal__body"></div>
      <div class="admin-modal__footer">
        <button type="button" class="admin-modal__btn admin-modal__btn--ghost" id="admin-modal-cancel">
          Cancel
        </button>
        <button type="button" class="admin-modal__btn admin-modal__btn--primary" id="admin-modal-save">
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="/hot-desk-config.js"></script>
  <script src="/pages/admin/script.js"></script>
</body>
</html>
