<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f8fa;
      font-family: "Poppins", Verdana, Geneva, Tahoma, sans-serif;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .top-bar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      padding: 12px 18px;
      background: #ea580c;
      color: #fff;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      z-index: 10;
    }
    .top-bar__back {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.15s ease;
    }
    .top-bar__back:hover {
      background: rgba(255, 255, 255, 0.32);
    }
    .top-bar__back:active {
      background: rgba(255, 255, 255, 0.14);
      transform: scale(0.96);
    }
    .top-bar__back:focus {
      outline: none;
    }
    .top-bar__back:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    .top-bar__back svg {
      display: block;
    }
    .top-bar__title {
      flex: 1;
      min-width: 0;
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .assets-main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 18px 24px;
    }

    .assets-empty {
      padding: 28px 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #64748b;
    }
    .assets-empty code {
      font-size: 0.82em;
      word-break: break-word;
    }

    .assets-group {
      margin-bottom: 22px;
    }
    .assets-group:last-child {
      margin-bottom: 0;
    }
    .assets-group__heading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .assets-group__heading-icon,
    .assets-group__name-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      flex-shrink: 0;
    }
    .assets-group__heading-icon svg {
      width: 14px;
      height: 14px;
    }
    .assets-group__list {
      list-style: none;
      margin: 0;
      padding: 0;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    .assets-group__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.92rem;
      font-weight: 500;
      color: #0f172a;
    }
    .assets-group__row:last-child {
      border-bottom: none;
    }
    .assets-group__name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .assets-group__name-icon svg {
      width: 16px;
      height: 16px;
    }
    .assets-group__row--inactive .assets-group__name {
      color: #64748b;
      text-decoration: line-through;
      text-decoration-color: #94a3b8;
    }
    .assets-group__badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: none;
      padding: 5px 11px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .assets-group__badge--available {
      color: #166534;
      background: #dcfce7;
    }
    .assets-group__badge--unavailable {
      color: #475569;
      background: #e2e8f0;
    }
    .assets-group__badge--broken {
      color: #9a3412;
      background: #ffedd5;
    }
    .assets-group__badge--maintenance {
      color: #1e40af;
      background: #dbeafe;
    }
    .assets-group__badge--missing {
      color: #7c2d12;
      background: #ffedd5;
    }
    .assets-group__badge--neutral {
      color: #334155;
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <button type="button" class="top-bar__back" id="btn-back" aria-label="Go back">
        <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <h1 class="top-bar__title">Assets</h1>
    </header>
    <main class="assets-main" id="assets-root">
      <p class="assets-empty" id="assets-status">Loading…</p>
    </main>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/pages/list-of-assets/script.js"></script>
</body>
</html>
